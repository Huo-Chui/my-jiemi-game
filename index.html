<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>手机桌面</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* 手机外框 */
    .phone {
      width: 375px;
      max-width: 90vw;
      height: 700px;
      max-height: 90vh;
      background: #f2f2f7;
      border-radius: 40px;
      box-shadow: 0 0 0 8px #333, 0 20px 40px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* 状态栏 */
    .status-bar {
      background: #f2f2f7;
      padding: 12px 24px 6px;
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      font-weight: 600;
      color: #000;
      border-top-left-radius: 32px;
      border-top-right-radius: 32px;
    }

    /* 桌面背景 */
    .desktop {
      flex: 1;
      background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
      /* 可以换成你喜欢的背景图：background: url('bg.jpg') center/cover; */
      padding: 30px 24px;
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 24px;
    }

    /* App 图标 */
    .app-icon {
      width: 70px;
      height: 70px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(10px);
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-decoration: none;
      color: #333;
    }

    .app-icon:hover {
      transform: scale(1.05);
      background: rgba(255,255,255,0.95);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    .app-icon:active {
      transform: scale(0.95);
    }

    /* 图标内部小图案（纯CSS绘制） */
    .icon-img {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      margin-bottom: 4px;
    }

    .icon-label {
      font-size: 11px;
      font-weight: 500;
      text-align: center;
      max-width: 70px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* 微聊图标：绿色聊天气泡 */
    .wechat-icon {
      background: #09b83e;
      position: relative;
    }
    .wechat-icon::after {
      content: "";
      position: absolute;
      bottom: 4px;
      right: 2px;
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 0 2px #09b83e;
    }

    /* 飞信图标：蓝色飞鸟或信封 */
    .feixin-icon {
      background: #007aff;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .feixin-icon::before {
      content: "✉";
      font-size: 22px;
      color: white;
      line-height: 1;
    }

    /* 底部导航条 */
    .home-bar {
      height: 20px;
      background: #f2f2f7;
      display: flex;
      justify-content: center;
      align-items: center;
      border-bottom-left-radius: 32px;
      border-bottom-right-radius: 32px;
      padding-bottom: 8px;
    }

    .home-indicator {
      width: 40%;
      height: 4px;
      background: #999;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="phone">
    <!-- 仿 iPhone 状态栏 -->
    <div class="status-bar">
      <span>9:41</span>
      <span>📶 🔋 91%</span>
    </div>

    <!-- 桌面区，放两个APP图标 -->
    <div class="desktop">
      <!-- 微聊 -->
      <a href="wechat.html" class="app-icon" title="微聊">
        <div class="icon-img wechat-icon"></div>
        <span class="icon-label">微聊</span>
      </a>

      <!-- 飞信 -->
      <a href="feixin.html" class="app-icon" title="飞信">
        <div class="icon-img feixin-icon"></div>
        <span class="icon-label">飞信</span>
      </a>
      <!-- 这里未来可以继续添加更多图标，比如相册、备忘录等 -->
    </div>

    <!-- 底部虚拟Home条 -->
    <div class="home-bar">
      <div class="home-indicator"></div>
    </div>
  </div>
</body>
</html>
