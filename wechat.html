<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>微聊</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      width: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 整体容器，占满屏幕 */
    .wechat-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: #f2f2f7;
    }

    /* 顶部状态栏 */
    .wechat-status {
      background: #ededed;
      padding: 8px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      font-weight: 600;
      color: #000;
      height: 36px;
      border-bottom: 1px solid #ddd;
    }
    .back-btn {
      cursor: pointer;
      color: #007aff;
      font-size: 14px;
      font-weight: normal;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .back-btn:hover {
      opacity: 0.7;
    }
    .status-center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-weight: 500;
    }

    /* 主内容区（列表+聊天） */
    .wechat-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* 左侧聊天列表 */
    .chat-list {
      width: 220px;
      min-width: 180px;
      background: #fff;
      border-right: 1px solid #ddd;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .chat-item {
      display: flex;
      align-items: center;
      padding: 12px 12px;
      cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.2s;
    }
    .chat-item:hover {
      background: #e8e8e8;
    }
    .chat-item.active {
      background: #c9e0fc;
    }
    .chat-avatar {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      background: #ccc;
      margin-right: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: white;
      font-weight: bold;
      flex-shrink: 0;
    }
    .chat-info {
      flex: 1;
      overflow: hidden;
    }
    .chat-name {
      font-size: 14px;
      font-weight: 500;
      color: #000;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chat-preview {
      font-size: 11px;
      color: #999;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .chat-meta {
      text-align: right;
      font-size: 10px;
      color: #bbb;
      flex-shrink: 0;
      margin-left: 6px;
    }
    .badge {
      background: #f43530;
      color: white;
      font-size: 10px;
      padding: 2px 5px;
      border-radius: 10px;
      margin-top: 4px;
      display: inline-block;
    }
    .pinned {
      font-size: 10px;
      color: #999;
      margin-right: 4px;
    }

    /* 右侧聊天窗口 */
    .chat-window {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #f5f5f5;
      min-width: 0;
    }
    .chat-header {
      background: #ededed;
      padding: 8px 16px;
      font-size: 15px;
      font-weight: 500;
      border-bottom: 1px solid #ddd;
      display: flex;
      align-items: center;
      height: 36px;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .message-row {
      display: flex;
      margin-bottom: 8px;
    }
    .message-row.self {
      justify-content: flex-end;
    }
    .message-row.other {
      justify-content: flex-start;
    }
    .message-bubble {
      max-width: 50%;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.5;
      word-break: break-all;
    }
    .message-row.other .message-bubble {
      background: white;
      border: 1px solid #e0e0e0;
    }
    .message-row.self .message-bubble {
      background: #95ec69;
    }
    .message-time {
      font-size: 10px;
      color: #999;
      margin-top: 2px;
    }
    .date-divider {
      text-align: center;
      font-size: 11px;
      color: #999;
      margin: 12px 0;
    }

    .chat-input-bar {
      background: #f7f7f7;
      padding: 8px 12px;
      border-top: 1px solid #ddd;
      display: flex;
      align-items: center;
    }
    .chat-input-bar input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      background: #fff;
      color: #999;
      pointer-events: none;
    }

    /* 响应式：小屏时缩小左侧列表 */
    @media (max-width: 600px) {
      .chat-list {
        width: 160px;
        min-width: 140px;
      }
      .chat-item {
        padding: 10px 8px;
      }
      .chat-avatar {
        width: 30px;
        height: 30px;
        font-size: 14px;
        margin-right: 8px;
      }
      .chat-name {
        font-size: 13px;
      }
      .chat-preview {
        font-size: 10px;
      }
      .message-bubble {
        max-width: 65%; /* 小屏上稍微放宽一点 */
        font-size: 12px;
      }
      .wechat-status {
        padding: 6px 12px;
        height: 30px;
        font-size: 12px;
      }
    }
  </style>
</head>

  // ========== 渲染函数 ==========
  let currentChatId = 'work';

  function renderChatList() {
    const listEl = document.getElementById('chatList');
    listEl.innerHTML = contacts.map(c => `
      <div class="chat-item${c.id === currentChatId ? ' active' : ''}" data-id="${c.id}">
        <div class="chat-avatar" style="background:${c.color}">${c.avatar}</div>
        <div class="chat-info">
          <div class="chat-name">${c.pinned ? '<span class="pinned">📌</span>' : ''}${c.name}</div>
          <div class="chat-preview">${c.lastMsg}</div>
        </div>
        <div class="chat-meta">
          <div>${c.lastTime}</div>
          ${c.unread > 0 ? `<div class="badge">${c.unread}</div>` : ''}
        </div>
      </div>
    `).join('');
    // 绑定点击
    document.querySelectorAll('.chat-item').forEach(item => {
      item.addEventListener('click', () => {
        const id = item.dataset.id;
        if (id) switchChat(id);
      });
    });
  }

  function switchChat(id) {
    currentChatId = id;
    renderChatList();
    const contact = contacts.find(c => c.id === id);
    document.getElementById('chatHeader').textContent = contact.name;
    renderMessages(id);
  }

  function renderMessages(chatId) {
    const msgs = messagesData[chatId] || [];
    const container = document.getElementById('chatMessages');
    let html = '';
    let lastDate = '';
    msgs.forEach(msg => {
      const date = msg.time.split(' ')[0];
      if (date !== lastDate) {
        html += `<div class="date-divider">${date}</div>`;
        lastDate = date;
      }
      const isSelf = msg.sender === 'self' || msg.sender === '主角';
      const senderName = msg.sender === 'self' ? '' : msg.sender;
      html += `
        <div class="message-row ${isSelf ? 'self' : 'other'}">
          <div style="width: 100%; ${isSelf ? 'display: flex; flex-direction: column; align-items: flex-end;' : 'display: flex; flex-direction: column; align-items: flex-start;'}">
            ${!isSelf ? `<div style="font-size:10px;color:#999;margin-bottom:2px;">${senderName}</div>` : ''}
            <div class="message-bubble" style="max-width:100%;">${msg.text}</div>
            <div class="message-time">${msg.time.split(' ')[1] || ''}</div>
          </div>
        </div>
      `;
    });
    container.innerHTML = html;
    container.scrollTop = container.scrollHeight;
  }

  // 初始化
  renderChatList();
  switchChat('work');
</script>
